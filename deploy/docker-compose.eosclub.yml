services:
  eosclub-astro:
    image: node:20-alpine
    container_name: eosclub_astro
    restart: unless-stopped
    working_dir: /app/repo
    # On first start: install pnpm, then run rebuild.sh to build and deploy.
    # Kept alive with tail after an explicit rebuild; GitHub Actions calls
    # `docker exec eosclub_astro /app/repo/deploy/rebuild.sh` instead.
    command: >
      /bin/sh -c "
        apk add --no-cache git curl rsync &&
        curl -fsSL https://get.pnpm.io/install.sh | ENV=/root/.shrc SHELL=/bin/sh sh - &&
        export PATH=/root/.local/share/pnpm:$$PATH &&
        tail -f /dev/null
      "
    env_file:
      - /var/www/private/eosclub/.env
    volumes:
      # Repo root — git was cloned directly into eos.khanyi.com/ (no /repo subdir).
      # Astro builds to /app/repo/dist which maps to /var/www/public/eos.khanyi.com/dist
      # on the host — exactly what Nginx serves. No separate /app/dist mount needed.
      - /var/www/public/eos.khanyi.com:/app/repo
    networks:
      - backend
    logging:
      driver: journald
      options:
        tag: "eosclub-astro"
        mode: non-blocking
        max-buffer-size: "4m"

networks:
  backend:
    name: docker_backend
    external: true
