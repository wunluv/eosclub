services:
  eosclub-astro:
    image: node:20-alpine
    container_name: eosclub_astro
    restart: unless-stopped
    working_dir: /app/repo
    # On first start: install pnpm. Kept alive by the Node server process.
    # GitHub Actions calls `docker exec eosclub_astro /app/repo/deploy/rebuild.sh`
    # which builds the site and (re)starts the Node server for Keystatic SSR routes.
    command: >
      /bin/sh -c "
        apk add --no-cache git curl rsync &&
        curl -fsSL https://get.pnpm.io/install.sh | ENV=/root/.shrc SHELL=/bin/sh sh - &&
        export PATH=/root/.local/share/pnpm:$$PATH &&
        tail -f /dev/null
      "
    env_file:
      - /var/www/private/eosclub/.env
    ports:
      # Astro Node server — handles /keystatic/* and /api/keystatic/* (SSR)
      # Nginx (on the host network) proxies these paths to 127.0.0.1:4321
      - "127.0.0.1:4321:4321"
    volumes:
      # Repo root — git was cloned directly into eos.khanyi.com/ (no /repo subdir).
      # Astro builds to /app/repo/dist/client (static, served by Nginx) and
      # /app/repo/dist/server (SSR, run by the Node server on port 4321).
      - /var/www/public/eos.khanyi.com:/app/repo
    networks:
      - backend
    logging:
      driver: journald
      options:
        tag: "eosclub-astro"
        mode: non-blocking
        max-buffer-size: "4m"

networks:
  backend:
    name: docker_backend
    external: true
