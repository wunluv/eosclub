# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name staging.prod.khanyi.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.prod.khanyi.com;

    # SSL — issued by Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/staging.prod.khanyi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.prod.khanyi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Astro static build output
    # Note: @astrojs/node adapter splits output into dist/client/ (static) and
    # dist/server/ (Keystatic API). Nginx only serves the static client bundle.
    root  /var/www/public/eos.khanyi.com/dist/client;
    index index.html;

    # Keystatic Admin UI — client-side SPA bundle shipped inside dist/keystatic/
    # All /keystatic/* paths fall back to the SPA entry point.
    location /keystatic/ {
        try_files $uri $uri/ /keystatic/index.html;
    }

    # Static assets — long-lived cache (Astro hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs for Astro SSG pages
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/staging.prod.khanyi.com.access.log;
    error_log  /var/log/nginx/staging.prod.khanyi.com.error.log;
}
