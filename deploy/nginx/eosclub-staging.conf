# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name staging.prod.khanyi.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/public;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.prod.khanyi.com;

    # SSL — issued by Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/staging.prod.khanyi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.prod.khanyi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Astro hybrid build: static pages → dist/client/, SSR (Keystatic) → Node server
    root  /var/www/public/eos.khanyi.com/dist/client;
    index index.html;

    # Keystatic Admin UI — SSR route handled by the Astro Node server
    # Node server runs on port 4322 (4321 is used by astro_oneplusone on this host)
    location /keystatic {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keystatic API routes — SSR, proxied to Node server
    location /api/keystatic {
        proxy_pass http://127.0.0.1:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long-lived cache (Astro hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Clean URLs for Astro SSG pages
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/staging.prod.khanyi.com.access.log;
    error_log  /var/log/nginx/staging.prod.khanyi.com.error.log;
}
