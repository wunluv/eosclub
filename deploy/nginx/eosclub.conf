server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eos-club.de www.eos-club.de;

    ssl_certificate     /etc/letsencrypt/live/eos-club.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eos-club.de/privkey.pem;

    # Astro hybrid build output
    # Static pages live in dist/client; Keystatic SSR routes are proxied to Node.
    root /var/www/public/eos.khanyi.com/dist/client;
    index index.html;

    # Keystatic Admin UI — SSR route handled by Astro Node server
    # IMPORTANT: nginx runs in Docker; use container DNS, not 127.0.0.1
    location /keystatic {
        proxy_pass http://eosclub-astro:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keystatic API routes — OAuth callback + API endpoints
    location /api/keystatic {
        proxy_pass http://eosclub-astro:4322;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro optimized assets (images, JS, CSS) — hashed filenames, immutable
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Static route handling for pre-rendered pages
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name eos-club.de www.eos-club.de;
    return 301 https://$server_name$request_uri;
}
