server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eos-club.de www.eos-club.de;

    ssl_certificate     /etc/letsencrypt/live/eos-club.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eos-club.de/privkey.pem;

    # Static site root — Astro build output
    root /var/www/public/eos.khanyi.com/dist;
    index index.html;

    # Keystatic Admin UI — served from within dist
    location /keystatic/ {
        try_files $uri $uri/ /keystatic/index.html;
    }

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA-style fallback for clean URLs
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name eos-club.de www.eos-club.de;
    return 301 https://$server_name$request_uri;
}
